name: Playwright Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Playwright/JS to TS migration'  # Only trigger if files in Playwright/JS to TS migration change
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Playwright/JS to TS migration'  # Only trigger if files in Playwright/JS to TS migration change

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
      working-directory: ./Playwright/JS\ to\ TS\ migration/
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: ./Playwright/JS\ to\ TS\ migration/
    - name: Run Playwright tests
      run: npm test
      working-directory: ./Playwright/JS\ to\ TS\ migration/
    - uses: actions/upload-artifact@v5
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: ./Playwright/JS\ to\ TS\ migration/playwright-report/
        retention-days: 1
